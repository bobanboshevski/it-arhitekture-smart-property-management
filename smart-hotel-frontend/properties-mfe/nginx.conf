server {
    listen 3010;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type';

        try_files $uri $uri/ /index.html;
    }
}