name: Shell CI

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./smart-hotel-frontend/shell
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-hotel-shell:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-hotel-shell:${{ github.sha }}
          build-args: |
            VITE_PROPERTIES_MFE_URL=http://localhost:3010
            VITE_BOOKINGS_MFE_URL=http://localhost:3020
            VITE_PRICING_MFE_URL=http://localhost:3030
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/smart-hotel-shell:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/smart-hotel-shell:buildcache,mode=max