name: Properties MFE CI

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./smart-hotel-frontend/properties-mfe
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/properties-mfe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/properties-mfe:${{ github.sha }}
          build-args: |
            VITE_API_GATEWAY_URL=http://localhost:3000/api/v1
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/properties-mfe:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/properties-mfe:buildcache,mode=max