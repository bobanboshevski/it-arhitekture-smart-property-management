name: Booking and Analytics Service CI
on:
  workflow_call:
  workflow_dispatch:
#  push:
#    paths:
#      - 'booking-analytics-service/**'
#  pull_request:
#    paths:
#      - 'booking-analytics-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('booking-analytics-service/go.sum') }}
          restore-keys: |
            go-

      - name: Download dependencies
        run: |
          cd booking-analytics-service
          go mod download
      - name: Run tests
        run: |
          cd booking-analytics-service
          go test ./... -v

  #      - name: Build binary (sanity check)
  #        run: |
  #          cd booking-analytics-service
  #          go build ./...
  #
  #      - name: Build Docker image
  #        run: docker build -t booking-analytics-service ./booking-analytics-service

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push with docker buildx (caching)
        uses: docker/build-push-action@v6
        with:
          context: ./booking-analytics-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/booking-analytics-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/booking-analytics-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/booking-analytics-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/booking-analytics-service:buildcache,mode=max

