name: Dynamic pricing service CI
on:
  workflow_call:
  workflow_dispatch:
#  push:
#    paths:
#      - 'dynamic-pricing-service/**'
#  pull_request:
#    paths:
#      - 'dynamic-pricing-service/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd dynamic-pricing-service
          npm ci

      - name: Run tests
        run: |
          cd dynamic-pricing-service
          npm run test -- --coverage

      - name: Build app
        run: |
          cd dynamic-pricing-service
          npm run build

  #      - name: Build Docker image
  #        run: docker build -t dynamic-pricing-service ./dynamic-pricing-service

  build-and-push:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push with docker buildx (caching)
        uses: docker/build-push-action@v6
        with:
          context: ./dynamic-pricing-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dynamic-pricing-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dynamic-pricing-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dynamic-pricing-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dynamic-pricing-service:buildcache,mode=max

            
